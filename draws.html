            <button class="nav-cta"><span>Sign In</span></button>

    <section class="draws-section">

        <!-- Calendar view -->
        <div id="calendarView">

            <div class="cal-header">
                <div class="cal-header-left">
                    <h2 class="section-title">Tournament Calendar</h2>
                    <div class="cal-year-row">
                        <button class="cal-nav-btn" id="calPrevYear">&#8592;</button>
                        <span class="cal-year-label" id="calYearLabel">2026</span>
                        <button class="cal-nav-btn" id="calNextYear">&#8594;</button>
                    </div>
                </div>
                <div class="cal-tour-tabs">
                    <button class="cal-tour-tab active" data-tour="ATP">ATP</button>
                    <button class="cal-tour-tab" data-tour="WTA">WTA</button>
                </div>
            </div>

            <!-- Sticky month jump strip -->
            <div class="cal-month-strip" id="calMonthStrip"></div>

            <!-- Month sections -->
            <div class="cal-months" id="calMonths">
                <!-- injected by draws.js -->
            </div>
        </div>

        <!-- Draw view -->
        <div id="drawView" style="display:none">
            <!-- Back nav -->
            <div class="draw-nav">
                <button class="draw-back-btn" id="drawBackBtn">&#8592; Calendar</button>
            </div>

            <!-- Draw header -->
            <div class="draw-view-header">
                <div class="draw-view-title-group">
                    <h2 class="draw-view-title" id="drawViewTitle">Full Draw</h2>
                    <div class="draw-view-sub" id="drawViewSub" role="status" aria-live="polite">—</div>
                </div>
            </div>

            <!-- Bracket-maker controls (mode toggle, fill, save/manage) — injected by BracketMaker -->
            <div id="bracketControls"></div>

            <!-- Round navigation tabs -->
            <div class="round-tabs" id="roundTabs"></div>

            <!-- Match content: either table or bracket -->
            <div id="roundMatchesWrap"></div>
        </div>

    </section>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="footer-logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">

                <p>Professional tennis analytics for fans. Live data from <a href="https://api-tennis.com" target="_blank" rel="noopener">api-tennis.com</a>.</p>
            </div>

            <p>© 2026 TennisWorld. Data updated in real time.</p>
        </div>
