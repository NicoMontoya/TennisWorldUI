            </ul>
            <button class="nav-theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <button class="nav-cta"><span>Sign In</span></button>
        </div>
    </nav>

    <!-- Head to Head -->
    <section class="analytics-section" id="h2hSection">
        <div class="section-header" data-scroll-reveal>
            <h2 class="section-title">Head to Head</h2>
            <p class="section-subtitle">Search any two players — all-time meetings, surface splits &amp; full match history</p>
        </div>

        <div class="h2h-search-card analytics-card" data-scroll-reveal>
            <div class="h2h-search-row">
                <div class="h2h-picker">
                    <input id="h2hInputA" class="h2h-input" type="text"
                           placeholder="Player 1 — type to search"
                           autocomplete="off" spellcheck="false" aria-label="Player 1">
                    <div class="h2h-dropdown" id="h2hDropA" hidden></div>
                </div>
                <div class="h2h-vs-badge">vs</div>
                <div class="h2h-picker">
                    <input id="h2hInputB" class="h2h-input" type="text"
                           placeholder="Player 2 — type to search"
                           autocomplete="off" spellcheck="false" aria-label="Player 2">
                    <div class="h2h-dropdown" id="h2hDropB" hidden></div>
                </div>
                <button class="h2h-compare-btn" id="h2hCompareBtn" disabled>Compare</button>
            </div>
        </div>
    </section>

    <!-- H2H Modal -->
    <div class="h2h-modal" id="h2hModal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Head to head results">
        <div class="h2h-modal-backdrop" id="h2hModalBackdrop"></div>
        <div class="h2h-modal-dialog">
            <button class="h2h-modal-close" id="h2hModalClose" aria-label="Close">&#x2715;</button>
            <div class="h2h-modal-body" id="h2hModalContent"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="footer-logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="16" cy="16" r="15" fill="#c9e94e"/>
                        <path d="M7 8 C13 12, 13 20, 7 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M25 8 C19 12, 19 20, 25 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                    </svg>
                    </div>
                    <span>TennisWorld</span>
                </div>
                <p>Professional tennis analytics for fans. Live data from <a href="https://api-tennis.com" target="_blank" rel="noopener">api-tennis.com</a>.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 TennisWorld. Data updated in real time.</p>
        </div>
    </footer>

    <script src="shared.js"></script>
    <script src="auth.js"></script>
    <script src="player-panel.js"></script>
    <script src="components/store.js"></script>
    <script src="components/ProbBar.js"></script>
    <script src="h2h.js"></script>
